model_name: "unsloth/Qwen3-1.7B-unsloth-bnb-4bit"
max_seq_length: 1024
lora:
  r: [8, 16, 32]
  lora_alpha: [16, 32, 64]
  lora_dropout: 0.0
  target_modules:
    [
      "q_proj",
      "k_proj",
      "v_proj",
      "o_proj",
      "gate_proj",
      "up_proj",
      "down_proj",
    ]
use_dora: false
training:
  num_train_epochs: 3
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-4
  warmup_ratio: 0.03
  lr_scheduler_type: "cosine"
  optim: "adamw_8bit"
  eval_strategy: "steps"
  eval_steps: 100
  save_steps: 200
  logging_steps: 20
  save_total_limit: 2
  early_stopping_patience: 5
  early_stopping_threshold: 0.0
