# Configuration for training
model_name: "unsloth/Qwen3-1.7B-unsloth-bnb-4bit"
max_seq_length: 1024

trainer_args:
  num_train_epochs: 3
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 0.00002 # 2e-5
  warmup_ratio: 0.1
  weight_decay: 0.01
  lr_scheduler_type: "cosine"
  optim: "adamw_8bit"
  logging_steps: 20
  eval_steps: 100
  save_steps: 200
  eval_strategy: "steps"
  save_strategy: "steps"
  load_best_model_at_end: true
  metric_for_best_model: "eval_loss"
  greater_is_better: false

configs:
  - name: "dora_r8"
    r: 8
    lora_alpha: 32
    use_dora: true
  - name: "dora_r16"
    r: 16
    lora_alpha: 32
    use_dora: true
  - name: "r32"
    r: 32
    lora_alpha: 64
    use_dora: false
