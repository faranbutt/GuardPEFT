model:
  name: "unsloth/Qwen3-1.7B-unsloth-bnb-4bit"
  max_seq_length: 1024

dataset:
  train_samples: 50
  val_samples: 10
  small_dataset_mode: false
training:
  num_train_epochs: 3
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-5
  warmup_ratio: 0.1
  weight_decay: 0.01
  lr_scheduler_type: "cosine"
  optim: "adamw_8bit"
  logging_steps: 20
  eval_steps: 100
  save_steps: 200
  seed: 25

dora:
  configs:
    - name: "dora_r8"
      r: 8
      lora_alpha: 32
      lora_dropout: 0.0
      adapter_dir: "./models/guardpeft_adapters/dora_r8"
    - name: "dora_r16"
      r: 16
      lora_alpha: 32
      lora_dropout: 0.0
      adapter_dir: "./models/guardpeft_adapters/dora_r16"
    - name: "dora_r32"
      r: 32
      lora_alpha: 64
      lora_dropout: 0.0
      adapter_dir: "./models/guardpeft_adapters/dora_r32"
  best_adapter_dir: "./models/guardpeft_adapters/dora_best"

qlora:
  configs:
    - name: "qlora_r8"
      r: 8
      lora_alpha: 16
      lora_dropout: 0.1
      adapter_dir: "./models/guardpeft_adapters/qlora_r8"
    - name: "qlora_r16"
      r: 16
      lora_alpha: 16
      lora_dropout: 0.1
      adapter_dir: "./models/guardpeft_adapters/qlora_r16"
    - name: "qlora_r32"
      r: 32
      lora_alpha: 16
      lora_dropout: 0.1
      adapter_dir: "./models/guardpeft_adapters/qlora_r32"
  best_adapter_dir: "./models/guardpeft_adapters/qlora_best"

hub:
  push_to_hub: false
  base_name: "faranbutt789/guardpeft-qwen3"
